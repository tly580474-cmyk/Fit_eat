<script>
        // Micro-interaction for heart icons
        document.querySelectorAll('[data-icon="favorite"]').forEach(button => {
            button.parentElement.addEventListener('click', function() {
                const icon = this.querySelector('.material-symbols-outlined');
                const count = this.querySelector('.font-label-md');
                const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
                
                if (isFilled) {
                    icon.style.fontVariationSettings = "'FILL' 0";
                    this.classList.remove('text-primary');
                    this.classList.add('text-on-surface-variant');
                } else {
                    icon.style.fontVariationSettings = "'FILL' 1";
                    this.classList.remove('text-on-surface-variant');
                    this.classList.add('text-primary');
                    
                    // Simple animation
                    this.classList.add('scale-125');
                    setTimeout(() => this.classList.remove('scale-125'), 200);
                }
            });
        });

        // Add scroll behavior to header
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            const header = document.querySelector('header');
            
            if (currentScroll <= 0) {
                header.classList.remove('-translate-y-full');
                return;
            }
            
            if (currentScroll > lastScroll && currentScroll > 64) {
                header.classList.add('-translate-y-full');
            } else {
                header.classList.remove('-translate-y-full');
            }
            lastScroll = currentScroll;
        });
    </script>
