<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轻食刻 - 我的</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006e1c',
            'primary-container': '#4caf50',
            secondary: '#8b5000',
            surface: '#f9f9f9',
          },
          borderRadius: { 'huge': '1.5rem' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body class="bg-gray-50 pb-24 lg:pb-8">

  <!-- 顶部导航栏 -->
  <header class="top-app-bar">
    <div class="flex justify-between items-center px-4 md:px-6 h-16 w-full max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center">
          <span class="material-symbols-outlined text-green-700 text-xl">restaurant</span>
        </div>
        <h1 class="font-bold text-xl text-green-700 tracking-tight">轻食刻</h1>
        <nav class="hidden md:flex items-center gap-1 ml-6">
          <a href="home.html" class="desktop-nav-link">首页</a>
          <a href="discover.html" class="desktop-nav-link">发现</a>
          <a href="record.html" class="desktop-nav-link">记录</a>
          <a href="community.html" class="desktop-nav-link">社区</a>
          <a href="profile.html" class="desktop-nav-link active">我的</a>
        </nav>
      </div>
      <div class="flex items-center gap-2">
        <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
          <span class="material-symbols-outlined text-green-700">settings</span>
        </button>
      </div>
    </div>
  </header>

  <!-- 主要内容 -->
  <main class="pt-20 px-4 md:px-6 max-w-5xl mx-auto">

    <!-- 用户资料 -->
    <section class="flex flex-col items-center mb-8 text-center animate-fade-in">
      <div class="relative group cursor-pointer" onclick="AvatarModal.open()">
        <div class="w-24 h-24 md:w-28 md:h-28 rounded-full overflow-hidden border-4 border-white shadow-lg transition-transform group-hover:scale-105">
          <img id="profile-avatar" src="" alt="头像" class="w-full h-full object-cover">
        </div>
        <div class="absolute bottom-0 right-0 w-8 h-8 bg-white rounded-full shadow-md flex items-center justify-center border border-gray-100 transition-all group-hover:bg-green-50 group-hover:shadow-lg">
          <span class="material-symbols-outlined text-green-600 text-base">photo_camera</span>
        </div>
      </div>
      <h1 id="profile-name" class="mt-4 text-2xl font-bold text-gray-800"></h1>
      <p id="profile-bio" class="text-gray-500 text-sm mt-1"></p>
    </section>

    <!-- 数据统计 (桌面端 3 栏 bento) -->
    <section class="grid grid-cols-3 gap-3 md:gap-6 mb-8 max-w-2xl mx-auto">
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center card-shadow-hover transition-all">
        <span id="stat-days" class="text-green-700 text-3xl font-extrabold">0</span>
        <span class="text-gray-500 text-sm mt-2">计划天数</span>
        <div class="mt-3 h-1 w-12 bg-green-100 rounded-full overflow-hidden">
          <div class="bg-green-500 h-full w-[80%]"></div>
        </div>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center card-shadow-hover transition-all">
        <span id="stat-records" class="text-green-700 text-3xl font-extrabold">0</span>
        <span class="text-gray-500 text-sm mt-2">饮食记录</span>
        <div class="mt-3 flex -space-x-2">
          <div class="w-6 h-6 rounded-full border-2 border-white bg-green-100 flex items-center justify-center">
            <span class="material-symbols-outlined text-[12px] text-green-600">restaurant</span>
          </div>
          <div class="w-6 h-6 rounded-full border-2 border-white bg-orange-100 flex items-center justify-center">
            <span class="material-symbols-outlined text-[12px] text-orange-600">eco</span>
          </div>
        </div>
      </div>
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center card-shadow-hover transition-all">
        <span id="stat-achievements" class="text-green-700 text-3xl font-extrabold">0</span>
        <span class="text-gray-500 text-sm mt-2">达成成就</span>
        <div class="mt-3 flex gap-1">
          <span class="material-symbols-outlined text-orange-500 text-lg" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
          <span class="material-symbols-outlined text-orange-500 text-lg" style="font-variation-settings: 'FILL' 1;">star</span>
        </div>
      </div>
    </section>

    <!-- Premium 会员推广 (桌面端横向) -->
    <section class="mb-8 relative overflow-hidden bg-gradient-to-br from-gray-800 to-gray-900 p-6 md:p-8 rounded-3xl text-white cursor-pointer group">
      <div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-center md:text-left">
          <div class="flex items-center justify-center md:justify-start gap-2 mb-2">
            <span class="material-symbols-outlined text-orange-400" style="font-variation-settings: 'FILL' 1;">stars</span>
            <span class="font-bold text-lg text-orange-300">Premium 会员</span>
          </div>
          <p class="text-gray-300 text-sm max-w-md">解锁专属营养师计划、深度数据分析及 500+ 精选健康菜谱。</p>
        </div>
        <button class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-6 py-3 rounded-full transition-all active:scale-95 shadow-lg whitespace-nowrap">
          免费试用 14 天
        </button>
      </div>
      <div class="absolute -right-10 -top-10 w-40 h-40 bg-green-500/20 rounded-full blur-3xl group-hover:bg-green-500/30 transition-colors"></div>
    </section>

    <!-- 功能菜单 & 成就墙 (桌面端 2/5 + 3/5 分栏) -->
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
      <!-- 左侧：功能菜单 -->
      <div class="lg:col-span-2 space-y-4">
        <h2 class="font-bold text-gray-800 px-1">个人设置</h2>
        <div class="bg-white rounded-2xl p-2 shadow-sm border border-gray-100 card-shadow">
          <button onclick="EditProfileModal.open()" class="w-full flex items-center justify-between p-4 hover:bg-gray-50 rounded-xl transition-colors group">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-gray-500 group-hover:text-green-600 transition-colors">person_outline</span>
              <span class="text-gray-800 font-medium">账号资料</span>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
          </button>
          <button onclick="AccountSettingsModal.open()" class="w-full flex items-center justify-between p-4 hover:bg-gray-50 rounded-xl transition-colors group">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-gray-500 group-hover:text-green-600 transition-colors">manage_accounts</span>
              <span class="text-gray-800 font-medium">修改ID或密码</span>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
          </button>
          <button onclick="window.location.href='my-posts.html'" class="w-full flex items-center justify-between p-4 hover:bg-gray-50 rounded-xl transition-colors group">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-gray-500 group-hover:text-green-600 transition-colors">article</span>
              <span class="text-gray-800 font-medium">我的动态</span>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 rounded-xl transition-colors group">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-gray-500 group-hover:text-green-600 transition-colors">notifications</span>
              <span class="text-gray-800 font-medium">消息提醒</span>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 rounded-xl transition-colors group">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-gray-500 group-hover:text-green-600 transition-colors">security</span>
              <span class="text-gray-800 font-medium">安全与隐私</span>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
          </button>
          <button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 rounded-xl transition-colors group">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-gray-500 group-hover:text-green-600 transition-colors">help</span>
              <span class="text-gray-800 font-medium">帮助与反馈</span>
            </div>
            <span class="material-symbols-outlined text-gray-300">chevron_right</span>
          </button>
        </div>
        <div class="bg-white rounded-2xl p-2 shadow-sm border border-gray-100 card-shadow">
          <button onclick="handleLogout()" class="w-full flex items-center justify-between p-4 hover:bg-red-50 rounded-xl transition-colors group">
            <div class="flex items-center gap-3 text-red-500">
              <span class="material-symbols-outlined">logout</span>
              <span class="font-medium">退出登录</span>
            </div>
          </button>
        </div>
      </div>

      <!-- 右侧：成就墙 -->
      <div class="lg:col-span-3 space-y-4">
        <div class="flex justify-between items-center px-1">
          <h2 class="font-bold text-gray-800">成就墙</h2>
          <button class="text-green-600 text-sm font-medium hover:underline">查看全部</button>
        </div>
        <div id="achievement-wall" class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-shadow">
          <div class="grid grid-cols-3 sm:grid-cols-4 gap-6" id="achievements-container">
            <!-- 动态加载 -->
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- FAB 按钮 -->
  <button class="fab bg-green-600 text-white" onclick="showSettings()">
    <span class="material-symbols-outlined text-3xl">add</span>
  </button>

  <!-- 底部导航栏 -->
  <nav class="bottom-nav mobile-only">
    <div class="flex justify-around items-center">
      <a href="home.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-medium mt-0.5">首页</span>
      </a>
      <a href="discover.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">explore</span>
        <span class="text-[10px] font-medium mt-0.5">发现</span>
      </a>
      <a href="record.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">analytics</span>
        <span class="text-[10px] font-medium mt-0.5">记录</span>
      </a>
      <a href="community.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">group</span>
        <span class="text-[10px] font-medium mt-0.5">社区</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl bg-green-100 text-green-800">
        <span class="material-symbols-outlined filled">person</span>
        <span class="text-[10px] font-medium mt-0.5">我的</span>
      </a>
    </div>
  </nav>

  <!-- Toast 提示 -->
  <div id="toast" class="toast">
    <span class="material-symbols-outlined text-green-400 filled">check_circle</span>
    <span id="toast-message">操作成功</span>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/components.js"></script>
  <script>
    // 更新页面显示的用户数据
    function updateProfileDisplay(user) {
      if (user.avatar) {
        document.getElementById('profile-avatar').src = user.avatar;
      }
      if (user.name) {
        document.getElementById('profile-name').textContent = user.name;
      }
      if (user.accountId) {
        // 更新 localStorage 中的账户ID
        localStorage.setItem('accountId', user.accountId);
      }
      if (user.bio !== undefined) {
        document.getElementById('profile-bio').textContent = user.bio || '';
      }
      if (user.planDays !== undefined) {
        document.getElementById('stat-days').textContent = user.planDays;
      }
      if (user.recordCount !== undefined) {
        document.getElementById('stat-records').textContent = user.recordCount;
      }
      if (user.achievementCount !== undefined) {
        document.getElementById('stat-achievements').textContent = user.achievementCount;
      }
    }

    async function initPage() {
      try {
        const [user, achievements] = await Promise.all([
          API.user.getProfile(),
          API.achievement.getAll()
        ]);

        updateProfileDisplay(user);
        renderAchievements(achievements);
      } catch (error) {
        console.error('加载数据失败:', error);
      }
    }

    function renderAchievements(achievements) {
      const container = document.getElementById('achievements-container');
      container.innerHTML = achievements.map(achievement => `
        <div class="flex flex-col items-center gap-2 ${achievement.unlocked ? '' : 'opacity-30 grayscale'}">
          <div class="w-16 h-16 rounded-full ${achievement.unlocked ? 'bg-green-50 text-green-600' : 'bg-gray-100 text-gray-400'} flex items-center justify-center group cursor-help relative">
            <span class="material-symbols-outlined text-3xl">${achievement.icon}</span>
            ${achievement.desc ? `
              <div class="absolute -bottom-10 opacity-0 group-hover:opacity-100 transition-opacity bg-gray-800 text-white text-[10px] py-1 px-2 rounded whitespace-nowrap z-10">
                ${achievement.desc}
              </div>
            ` : ''}
          </div>
          <span class="text-xs font-medium text-gray-600">${achievement.name}</span>
        </div>
      `).join('');
    }

    function showSettings() { Utils.showToast('设置功能开发中...'); }

    function handleLogout() {
      localStorage.removeItem('token');
      localStorage.removeItem('accountId');
      window.location.href = 'login.html';
    }

    if (!localStorage.getItem('token')) window.location.href = 'login.html';
    document.addEventListener('DOMContentLoaded', initPage);
  </script>

</body>
</html>
