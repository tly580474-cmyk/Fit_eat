<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轻食刻 - 发现</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006e1c',
            'primary-container': '#4caf50',
            secondary: '#8b5000',
            surface: '#f9f9f9',
          },
          borderRadius: { 'huge': '1.5rem' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body class="bg-gray-50 pb-24 lg:pb-8">

  <!-- 顶部导航栏 -->
  <header class="top-app-bar">
    <div class="flex justify-between items-center px-4 md:px-6 h-16 w-full max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center">
          <span class="material-symbols-outlined text-green-700 text-xl">restaurant</span>
        </div>
        <h1 class="font-bold text-xl text-green-700 tracking-tight">轻食刻</h1>
        <nav class="hidden md:flex items-center gap-1 ml-6">
          <a href="home.html" class="desktop-nav-link">首页</a>
          <a href="discover.html" class="desktop-nav-link active">发现</a>
          <a href="record.html" class="desktop-nav-link">记录</a>
          <a href="discover.html" class="desktop-nav-link">社区</a>
          <a href="profile.html" class="desktop-nav-link">我的</a>
        </nav>
      </div>
      <div class="flex items-center gap-2">
        <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
          <span class="material-symbols-outlined text-green-700">search</span>
        </button>
        <button class="hidden md:flex bg-green-600 text-white px-4 py-2 rounded-full font-bold text-sm hover:bg-green-700 transition-colors items-center gap-1" onclick="showCreatePost()">
          <span class="material-symbols-outlined text-lg">edit</span>
          发布动态
        </button>
      </div>
    </div>
  </header>

  <!-- 主要内容 -->
  <main class="pt-20 px-4 md:px-6 max-w-7xl mx-auto">

    <!-- 分类筛选 -->
    <section class="mb-6 overflow-x-auto hide-scrollbar">
      <div class="flex gap-2 py-2">
        <button class="category-chip active px-5 py-2 rounded-full bg-green-600 text-white font-medium text-sm whitespace-nowrap transition-all" data-category="all">全部动态</button>
        <button class="category-chip px-5 py-2 rounded-full bg-white text-gray-600 font-medium text-sm whitespace-nowrap hover:bg-gray-50 transition-all border border-gray-200" data-category="expert">专家专栏</button>
        <button class="category-chip px-5 py-2 rounded-full bg-white text-gray-600 font-medium text-sm whitespace-nowrap hover:bg-gray-50 transition-all border border-gray-200" data-category="recipe">减脂食谱</button>
        <button class="category-chip px-5 py-2 rounded-full bg-white text-gray-600 font-medium text-sm whitespace-nowrap hover:bg-gray-50 transition-all border border-gray-200" data-category="workout">运动打卡</button>
        <button class="category-chip px-5 py-2 rounded-full bg-white text-gray-600 font-medium text-sm whitespace-nowrap hover:bg-gray-50 transition-all border border-gray-200" data-category="share">好物分享</button>
      </div>
    </section>

    <!-- 社区动态 - 桌面端瀑布流 -->
    <section>
      <div id="posts-container" class="masonry-grid">
        <!-- 动态加载 -->
      </div>

      <!-- 加载更多 -->
      <div class="flex justify-center py-8">
        <button id="load-more" class="px-8 py-3 bg-white text-green-600 font-bold rounded-full hover:bg-green-50 transition-all flex items-center gap-2 group card-shadow">
          加载更多动态
          <span class="material-symbols-outlined group-hover:rotate-180 transition-transform duration-500">expand_more</span>
        </button>
      </div>
    </section>

  </main>

  <!-- FAB 按钮 (桌面端带 tooltip) -->
  <div class="fixed bottom-8 right-8 z-40 group">
    <div class="hidden md:block absolute bottom-full right-0 mb-2 px-3 py-1.5 bg-gray-800 text-white text-xs rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
      分享我的轻食生活
    </div>
    <button class="fab bg-green-600 text-white shadow-lg shadow-green-200 hover:bg-green-700" onclick="showCreatePost()">
      <span class="material-symbols-outlined text-3xl">add</span>
    </button>
  </div>

  <!-- 底部导航栏 -->
  <nav class="bottom-nav mobile-only">
    <div class="flex justify-around items-center">
      <a href="home.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-medium mt-0.5">首页</span>
      </a>
      <a href="discover.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl bg-green-100 text-green-800">
        <span class="material-symbols-outlined filled">explore</span>
        <span class="text-[10px] font-medium mt-0.5">发现</span>
      </a>
      <a href="record.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">analytics</span>
        <span class="text-[10px] font-medium mt-0.5">记录</span>
      </a>
      <a href="discover.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">group</span>
        <span class="text-[10px] font-medium mt-0.5">社区</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[10px] font-medium mt-0.5">我的</span>
      </a>
    </div>
  </nav>

  <!-- Toast 提示 -->
  <div id="toast" class="toast">
    <span class="material-symbols-outlined text-green-400 filled">check_circle</span>
    <span id="toast-message">操作成功</span>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/components.js"></script>
  <script>
    let currentCategory = 'all';
    let posts = [];

    async function initPage() {
      try {
        await API.user.getProfile();
        await loadPosts();
        bindCategoryEvents();
        document.getElementById('load-more').addEventListener('click', loadMorePosts);
      } catch (error) {
        console.error('加载数据失败:', error);
      }
    }

    async function loadPosts() {
      posts = await API.community.getPosts(1, currentCategory);
      renderPosts(posts);
    }

    function renderPosts(postsData) {
      const container = document.getElementById('posts-container');
      container.innerHTML = postsData.map(post => `
        <article class="masonry-item bg-white rounded-2xl overflow-hidden card-shadow card-shadow-hover transition-all">
          ${post.image ? `
            <div class="aspect-[4/5] w-full bg-gray-100">
              <img src="${post.image}" alt="" class="w-full h-full object-cover">
            </div>
          ` : ''}
          <div class="p-4">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-8 h-8 rounded-full overflow-hidden bg-gray-100">
                <img src="${post.user.avatar}" alt="${post.user.name}" class="w-full h-full object-cover">
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-bold text-sm truncate">${post.user.name}</p>
                <p class="text-xs text-gray-400">${post.time}</p>
              </div>
              <button class="text-green-600 text-xs font-bold hover:text-green-700 flex-shrink-0" onclick="followUser(${post.id})">+ 关注</button>
            </div>
            <p class="text-sm leading-relaxed text-gray-700 mb-3 line-clamp-4">${post.content}</p>
            <div class="flex items-center gap-4 pt-2 border-t border-gray-50">
              <button class="flex items-center gap-1 text-gray-400 hover:text-red-500 transition-colors" onclick="toggleLike(${post.id}, this)">
                <span class="material-symbols-outlined text-lg">favorite</span>
                <span class="text-xs">${Utils.formatNumber(post.likes)}</span>
              </button>
              <button class="flex items-center gap-1 text-gray-400 hover:text-green-600 transition-colors" onclick="showComments(${post.id})">
                <span class="material-symbols-outlined text-lg">chat_bubble</span>
                <span class="text-xs">${post.comments}</span>
              </button>
              <button class="flex items-center gap-1 text-gray-400 hover:text-green-600 transition-colors ml-auto" onclick="sharePost(${post.id})">
                <span class="material-symbols-outlined text-lg">share</span>
              </button>
            </div>
          </div>
        </article>
      `).join('');
    }

    function bindCategoryEvents() {
      document.querySelectorAll('.category-chip').forEach(chip => {
        chip.addEventListener('click', function() {
          document.querySelectorAll('.category-chip').forEach(c => {
            c.classList.remove('active', 'bg-green-600', 'text-white');
            c.classList.add('bg-white', 'text-gray-600', 'border', 'border-gray-200');
          });
          this.classList.add('active', 'bg-green-600', 'text-white');
          this.classList.remove('bg-white', 'text-gray-600', 'border', 'border-gray-200');
          currentCategory = this.dataset.category;
          loadPosts();
        });
      });
    }

    async function toggleLike(postId, btn) {
      const icon = btn.querySelector('.material-symbols-outlined');
      const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
      if (isFilled) {
        icon.style.fontVariationSettings = "'FILL' 0";
        icon.classList.remove('text-red-500');
      } else {
        icon.style.fontVariationSettings = "'FILL' 1";
        icon.classList.add('text-red-500');
        btn.classList.add('scale-125');
        setTimeout(() => btn.classList.remove('scale-125'), 200);
      }
      await API.community.toggleLike(postId);
    }

    async function followUser(postId) {
      await API.community.toggleFollow(postId);
      Utils.showToast('关注成功');
    }

    function showComments(postId) { Utils.showToast('评论功能开发中...'); }
    function sharePost(postId) { Utils.showToast('分享功能开发中...'); }
    async function loadMorePosts() { Utils.showToast('加载中...'); }
    function showCreatePost() { Utils.showToast('发布功能开发中...'); }

    if (!localStorage.getItem('token')) window.location.href = 'login.html';
    document.addEventListener('DOMContentLoaded', initPage);
  </script>

</body>
</html>
