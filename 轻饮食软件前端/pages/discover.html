<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轻食刻 - 发现</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006e1c',
            'primary-container': '#4caf50',
            secondary: '#8b5000',
            surface: '#f9f9f9',
          },
          borderRadius: { 'huge': '1.5rem' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body class="bg-gray-50 pb-24 lg:pb-8">

  <!-- 顶部导航栏 -->
  <header class="top-app-bar">
    <div class="flex justify-between items-center px-4 md:px-6 h-16 w-full max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center">
          <span class="material-symbols-outlined text-green-700 text-xl">restaurant</span>
        </div>
        <h1 class="font-bold text-xl text-green-700 tracking-tight">轻食刻</h1>
        <nav class="hidden md:flex items-center gap-1 ml-6">
          <a href="home.html" class="desktop-nav-link">首页</a>
          <a href="discover.html" class="desktop-nav-link active">发现</a>
          <a href="record.html" class="desktop-nav-link">记录</a>
          <a href="community.html" class="desktop-nav-link">社区</a>
          <a href="profile.html" class="desktop-nav-link">我的</a>
        </nav>
      </div>
      <div class="flex items-center gap-2">
        <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
          <span class="material-symbols-outlined text-green-700">notifications</span>
        </button>
      </div>
    </div>
  </header>

  <!-- 主要内容 -->
  <main class="pt-20 px-4 md:px-6 max-w-7xl mx-auto">

    <!-- 搜索栏 -->
    <section class="mb-6">
      <div class="relative">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">search</span>
        <input id="search-input" type="text" placeholder="搜索食谱、食材、健康知识..."
          class="w-full pl-12 pr-4 py-3.5 bg-white rounded-2xl border border-gray-200 focus:border-green-500 focus:ring-0 transition-colors text-sm shadow-sm"
          oninput="debounceSearch()">
        <button id="search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-100 hidden" onclick="clearSearch()">
          <span class="material-symbols-outlined text-gray-400 text-lg">close</span>
        </button>
      </div>
      <!-- 搜索结果 -->
      <div id="search-results" class="hidden mt-3 bg-white rounded-2xl shadow-lg border border-gray-100 max-h-80 overflow-y-auto"></div>
    </section>

    <!-- 桌面端: 左右分栏 -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <!-- 左侧主内容 -->
      <div class="lg:col-span-8">

        <!-- 快捷分类 -->
        <section class="mb-6">
          <div class="grid grid-cols-4 gap-3">
            <button onclick="filterByMeal('breakfast')" class="flex flex-col items-center gap-2 p-4 bg-white rounded-2xl card-shadow card-shadow-hover transition-all group">
              <div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center group-hover:bg-green-100 transition-colors">
                <span class="material-symbols-outlined text-green-600 text-2xl">wb_sunny</span>
              </div>
              <span class="text-xs font-medium text-gray-700">早餐</span>
            </button>
            <button onclick="filterByMeal('lunch')" class="flex flex-col items-center gap-2 p-4 bg-white rounded-2xl card-shadow card-shadow-hover transition-all group">
              <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center group-hover:bg-orange-100 transition-colors">
                <span class="material-symbols-outlined text-orange-600 text-2xl">lunch_dining</span>
              </div>
              <span class="text-xs font-medium text-gray-700">午餐</span>
            </button>
            <button onclick="filterByMeal('dinner')" class="flex flex-col items-center gap-2 p-4 bg-white rounded-2xl card-shadow card-shadow-hover transition-all group">
              <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center group-hover:bg-blue-100 transition-colors">
                <span class="material-symbols-outlined text-blue-600 text-2xl">dinner_dining</span>
              </div>
              <span class="text-xs font-medium text-gray-700">晚餐</span>
            </button>
            <button onclick="filterByMeal('snack')" class="flex flex-col items-center gap-2 p-4 bg-white rounded-2xl card-shadow card-shadow-hover transition-all group">
              <div class="w-12 h-12 rounded-full bg-purple-50 flex items-center justify-center group-hover:bg-purple-100 transition-colors">
                <span class="material-symbols-outlined text-purple-600 text-2xl">cookie</span>
              </div>
              <span class="text-xs font-medium text-gray-700">加餐</span>
            </button>
          </div>
        </section>

        <!-- 精选食谱 -->
        <section class="mb-8">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-gray-800 flex items-center gap-2">
              <span class="material-symbols-outlined text-green-600" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
              精选食谱
            </h3>
            <button class="text-green-600 text-sm font-medium hover:underline" onclick="filterByMeal('all')">查看全部</button>
          </div>
          <div id="featured-recipes" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- 动态加载 -->
          </div>
        </section>

        <!-- 食材百科 -->
        <section class="mb-8">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-gray-800 flex items-center gap-2">
              <span class="material-symbols-outlined text-orange-500" style="font-variation-settings: 'FILL' 1;">nutrition</span>
              食材百科
            </h3>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="ingredient-guide">
            <!-- 动态加载 -->
          </div>
        </section>
      </div>

      <!-- 右侧边栏 (桌面端) -->
      <div class="lg:col-span-4">

        <!-- 健康知识 -->
        <section class="mb-6">
          <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-blue-500" style="font-variation-settings: 'FILL' 1;">menu_book</span>
            健康知识
          </h3>
          <div class="space-y-3" id="health-articles">
            <!-- 动态加载 -->
          </div>
        </section>

        <!-- 每日一贴 -->
        <section class="mb-6">
          <div class="bg-gradient-to-br from-green-600 to-green-700 rounded-2xl p-5 text-white">
            <div class="flex items-center gap-2 mb-3">
              <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">tips_and_updates</span>
              <h4 class="font-bold">每日一贴</h4>
            </div>
            <p id="daily-tip" class="text-sm text-green-100 leading-relaxed"></p>
          </div>
        </section>

        <!-- 热门标签 -->
        <section>
          <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
            <span class="material-symbols-outlined text-red-500" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
            热门标签
          </h3>
          <div class="flex flex-wrap gap-2">
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#高蛋白食谱</span>
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#低碳水饮食</span>
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#5分钟早餐</span>
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#减脂餐</span>
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#Omega-3</span>
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#增肌饮食</span>
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#轻食主义</span>
            <span class="px-3 py-1.5 bg-white text-gray-600 text-xs rounded-full border border-gray-200 hover:border-green-500 hover:text-green-600 cursor-pointer transition-colors">#控糖生活</span>
          </div>
        </section>
      </div>
    </div>

  </main>

  <!-- 底部导航栏 -->
  <nav class="bottom-nav mobile-only">
    <div class="flex justify-around items-center">
      <a href="home.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">home</span>
        <span class="text-[10px] font-medium mt-0.5">首页</span>
      </a>
      <a href="discover.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl bg-green-100 text-green-800">
        <span class="material-symbols-outlined filled">explore</span>
        <span class="text-[10px] font-medium mt-0.5">发现</span>
      </a>
      <a href="record.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">analytics</span>
        <span class="text-[10px] font-medium mt-0.5">记录</span>
      </a>
      <a href="community.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">group</span>
        <span class="text-[10px] font-medium mt-0.5">社区</span>
      </a>
      <a href="profile.html" class="flex flex-col items-center justify-center px-3 py-1 rounded-2xl text-gray-500 hover:bg-gray-50">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[10px] font-medium mt-0.5">我的</span>
      </a>
    </div>
  </nav>

  <!-- Toast 提示 -->
  <div id="toast" class="toast">
    <span class="material-symbols-outlined text-green-400 filled">check_circle</span>
    <span id="toast-message">操作成功</span>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/components.js"></script>
  <script>
    let allRecipes = [];
    let currentPage = 1;
    let totalPages = 1;

    const ingredients = [
      { name: '鸡胸肉', benefit: '高蛋白低脂', icon: 'set_meal', color: 'orange' },
      { name: '牛油果', benefit: '优质脂肪', icon: 'eco', color: 'green' },
      { name: '三文鱼', benefit: 'Omega-3', icon: 'set_meal', color: 'blue' },
      { name: '西兰花', benefit: '高纤维维C', icon: 'grass', color: 'green' },
      { name: '藜麦', benefit: '完全蛋白', icon: 'grain', color: 'yellow' },
      { name: '希腊酸奶', benefit: '益生菌高钙', icon: 'local_cafe', color: 'purple' },
    ];

    const healthArticles = [
      { title: '减脂期间如何正确摄入碳水？', desc: '优质碳水 vs 精制碳水，选对才能瘦得快。', icon: 'grain', color: 'orange' },
      { title: '蛋白质摄入量计算指南', desc: '体重 × 1.5-2g，运动人群需要更多。', icon: 'fitness_center', color: 'blue' },
      { title: '8 种高饱腹感低热量食物', desc: '吃饱也能瘦，关键是选对食材。', icon: 'local_fire_department', color: 'red' },
      { title: '水波蛋的完美做法', desc: '3 分钟学会，零失败的早餐必备技能。', icon: 'egg', color: 'yellow' },
      { title: 'Omega-3 脂肪酸的重要性', desc: '为什么营养师都推荐每周吃两次鱼？', icon: 'spa', color: 'green' },
    ];

    const dailyTips = [
      '早餐摄入全天 30% 的热量，能有效提升上午的代谢率。建议搭配蛋白质 + 复合碳水 + 少量健康脂肪。',
      '每天饮水 2000ml 以上，餐前喝一杯水可以增加饱腹感，减少正餐摄入量约 15%。',
      '减脂期间不必完全戒糖，适量天然果糖（水果）是安全的。但要避免添加糖和含糖饮料。',
      '蔬菜占每餐的一半以上，既增加饱腹感又提供丰富的维生素和矿物质，热量却极低。',
      '晚上 8 点后进食不会直接导致发胖，关键是全天总热量。但如果容易暴食，建议设定进食时间窗口。',
    ];

    const typeColors = {
      breakfast: 'bg-green-100 text-green-700',
      lunch: 'bg-orange-100 text-orange-700',
      dinner: 'bg-blue-100 text-blue-700',
      snack: 'bg-purple-100 text-purple-700'
    };

    const typeBgColors = {
      breakfast: 'bg-green-50',
      lunch: 'bg-orange-50',
      dinner: 'bg-blue-50',
      snack: 'bg-purple-50'
    };

    const typeTextColors = {
      breakfast: 'text-green-400',
      lunch: 'text-orange-400',
      dinner: 'text-blue-400',
      snack: 'text-purple-400'
    };

    const typeNames = {
      breakfast: '早餐',
      lunch: '午餐',
      dinner: '晚餐',
      snack: '加餐'
    };

    let currentFilter = 'all';
    let searchTimer = null;

    async function initPage() {
      await loadRecipes('all');
      renderIngredients();
      renderHealthArticles();
      renderDailyTip();
    }

    async function loadRecipes(mealType, page = 1) {
      const container = document.getElementById('featured-recipes');
      container.innerHTML = '<div class="col-span-2 flex justify-center py-8"><div class="w-8 h-8 border-2 border-green-200 border-t-green-600 rounded-full animate-spin"></div></div>';

      try {
        const data = await API.food.getList(page, mealType);
        allRecipes = data.items.map(f => ({
          id: f.id, name: f.name, calories: f.calories, protein: f.protein,
          type: f.mealType, tags: f.tags || [], time: f.prepTime || '', difficulty: f.difficulty || '简单',
          image: f.image || ''
        }));
        currentPage = data.page;
        totalPages = data.pages;
        renderRecipes(allRecipes);
      } catch (err) {
        container.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-8">加载失败，请重试</p>';
      }
    }

    function renderRecipes(recipes) {
      const container = document.getElementById('featured-recipes');
      if (recipes.length === 0) {
        container.innerHTML = '<p class="col-span-2 text-center text-gray-400 py-8">暂无相关食谱</p>';
        return;
      }
      container.innerHTML = recipes.map(recipe => `
        <div class="bg-white rounded-2xl overflow-hidden card-shadow card-shadow-hover transition-all cursor-pointer flex"
             onclick="goToFoodDetail(${recipe.id})">
          <div class="w-2/5 h-40 overflow-hidden flex-shrink-0 relative">
            <img class="w-full h-full object-cover hover:scale-105 transition-transform duration-500 absolute inset-0 z-10"
                 src="${recipe.image || ''}" alt="${recipe.name}"
                 style="${recipe.image ? '' : 'display:none'}"
                 onload="this.style.display='block';this.nextElementSibling.style.display='none'"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="w-full h-full flex items-center justify-center ${typeBgColors[recipe.type] || 'bg-gray-100'}"
                 style="${recipe.image ? 'display:none' : ''}">
              <span class="text-3xl font-bold ${typeTextColors[recipe.type] || 'text-gray-400'}">${recipe.name.charAt(0)}</span>
            </div>
          </div>
          <div class="p-4 flex-1 flex flex-col justify-between min-w-0">
            <div>
              <span class="${typeColors[recipe.type] || 'bg-gray-100 text-gray-600'} px-2 py-0.5 rounded-full text-[10px] font-bold">${typeNames[recipe.type] || recipe.type}</span>
              <h4 class="font-bold text-gray-800 mt-2 text-sm truncate">${recipe.name}</h4>
            </div>
            <div>
              <p class="text-xs text-gray-500 mb-2">${recipe.calories} kcal · 蛋白质 ${recipe.protein}g</p>
              <div class="flex gap-1 flex-wrap">
                ${recipe.tags.slice(0, 3).map(tag => `<span class="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded">${tag}</span>`).join('')}
              </div>
            </div>
          </div>
        </div>
      `).join('');

      // 分页按钮
      if (totalPages > 1) {
        container.innerHTML += `
          <div class="col-span-2 flex justify-center gap-2 py-4">
            ${currentPage > 1 ? `<button onclick="changePage(${currentPage - 1})" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm hover:bg-gray-50">上一页</button>` : ''}
            <span class="px-4 py-2 text-sm text-gray-500">${currentPage} / ${totalPages}</span>
            ${currentPage < totalPages ? `<button onclick="changePage(${currentPage + 1})" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-sm hover:bg-gray-50">下一页</button>` : ''}
          </div>
        `;
      }
    }

    async function changePage(page) {
      await loadRecipes(currentFilter, page);
      document.getElementById('featured-recipes').scrollIntoView({ behavior: 'smooth' });
    }

    function renderIngredients() {
      const container = document.getElementById('ingredient-guide');
      const colorMap = { green: 'bg-green-50 text-green-600', orange: 'bg-orange-50 text-orange-600', blue: 'bg-blue-50 text-blue-600', yellow: 'bg-yellow-50 text-yellow-700', purple: 'bg-purple-50 text-purple-600' };
      container.innerHTML = ingredients.map(item => `
        <div class="bg-white rounded-2xl p-4 card-shadow card-shadow-hover transition-all cursor-pointer text-center">
          <div class="w-12 h-12 mx-auto mb-2 rounded-full ${colorMap[item.color]} flex items-center justify-center">
            <span class="material-symbols-outlined text-xl">${item.icon}</span>
          </div>
          <h5 class="font-bold text-gray-800 text-sm">${item.name}</h5>
          <p class="text-xs text-gray-500 mt-1">${item.benefit}</p>
        </div>
      `).join('');
    }

    function renderHealthArticles() {
      const container = document.getElementById('health-articles');
      const colorMap = { orange: 'text-orange-500', blue: 'text-blue-500', red: 'text-red-500', yellow: 'text-yellow-600', green: 'text-green-600' };
      container.innerHTML = healthArticles.map(article => `
        <div class="bg-white rounded-2xl p-4 card-shadow card-shadow-hover transition-all cursor-pointer flex gap-3 items-start">
          <div class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined ${colorMap[article.color]}">${article.icon}</span>
          </div>
          <div class="min-w-0">
            <h5 class="font-bold text-gray-800 text-sm mb-1">${article.title}</h5>
            <p class="text-xs text-gray-500 line-clamp-2">${article.desc}</p>
          </div>
        </div>
      `).join('');
    }

    function renderDailyTip() {
      const tip = dailyTips[Math.floor(Math.random() * dailyTips.length)];
      document.getElementById('daily-tip').textContent = tip;
    }

    async function filterByMeal(type) {
      currentFilter = type;
      await loadRecipes(type);
    }

    function debounceSearch() {
      clearTimeout(searchTimer);
      const query = document.getElementById('search-input').value.trim();
      const clearBtn = document.getElementById('search-clear');
      clearBtn.classList.toggle('hidden', !query);

      if (!query) {
        document.getElementById('search-results').classList.add('hidden');
        return;
      }

      searchTimer = setTimeout(() => performSearch(query), 300);
    }

    async function performSearch(query) {
      const resultsContainer = document.getElementById('search-results');
      try {
        const results = await API.food.search(query);
        if (results && results.length > 0) {
          resultsContainer.innerHTML = results.map(food => `
            <div class="flex items-center gap-3 p-3 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-50 last:border-0"
                 onclick="goToFoodDetail(${food.id})">
              <div class="w-10 h-10 rounded-lg bg-green-50 flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-green-600">restaurant</span>
              </div>
              <div class="min-w-0 flex-1">
                <p class="font-medium text-sm text-gray-800 truncate">${food.name}</p>
                <p class="text-xs text-gray-500">${food.calories} kcal · 蛋白质 ${food.protein}g</p>
              </div>
              <span class="material-symbols-outlined text-gray-300 text-lg">chevron_right</span>
            </div>
          `).join('');
          resultsContainer.classList.remove('hidden');
        } else {
          resultsContainer.innerHTML = '<p class="p-4 text-center text-gray-400 text-sm">未找到相关结果</p>';
          resultsContainer.classList.remove('hidden');
        }
      } catch (error) {
        // 本地搜索 fallback
        const localResults = allRecipes.filter(r => r.name.includes(query) || r.tags.some(t => t.includes(query)));
        if (localResults.length > 0) {
          resultsContainer.innerHTML = localResults.map(food => `
            <div class="flex items-center gap-3 p-3 hover:bg-gray-50 cursor-pointer transition-colors border-b border-gray-50 last:border-0"
                 onclick="goToFoodDetail(${food.id})">
              <div class="w-10 h-10 rounded-lg bg-green-50 flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-green-600">restaurant</span>
              </div>
              <div class="min-w-0 flex-1">
                <p class="font-medium text-sm text-gray-800 truncate">${food.name}</p>
                <p class="text-xs text-gray-500">${food.calories} kcal</p>
              </div>
              <span class="material-symbols-outlined text-gray-300 text-lg">chevron_right</span>
            </div>
          `).join('');
          resultsContainer.classList.remove('hidden');
        } else {
          resultsContainer.innerHTML = '<p class="p-4 text-center text-gray-400 text-sm">未找到相关结果</p>';
          resultsContainer.classList.remove('hidden');
        }
      }
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      document.getElementById('search-results').classList.add('hidden');
      document.getElementById('search-clear').classList.add('hidden');
    }

    function goToFoodDetail(id) {
      window.location.href = `food-detail.html?id=${id}`;
    }

    if (!localStorage.getItem('token')) window.location.href = 'login.html';
    document.addEventListener('DOMContentLoaded', initPage);
  </script>

</body>
</html>
